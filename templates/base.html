<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Mostra o título da página que vem do Python (variável passada pelo render_template) -->
    <title>{{ titulo }}</title>

    <!-- Link do seu arquivo CSS estático dentro da pasta 'static' -->
    <!-- url_for('static', filename='style.css') cria o caminho correto para o arquivo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Link do Bootstrap (framework CSS) para estilos prontos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Script JavaScript vinculado a este template -->
    <script src="{{ url_for('static', filename='scripts.js') }}" defer></script>
</head>
<body class="container">
    
    <!-- Mostra o título grande na página (o mesmo que passou no render_template) -->
    <h1 class="mt-3">{{ titulo }}</h1>

    {% block content %}{% endblock %}
    <!-- block content e endblock são marcações do Jinja2 para blocos de conteúdo. Isso indica um espaço que pode ser preenchido ou sobrescrito em templates que “herdam” este template. (Repare que você está usando esse arquivo como base e o conteúdo real da agenda aparece aqui.) Jinja2 é o mecanismo de templates que o Flask usa para renderizar HTML com variáveis e lógica. :contentReference[oaicite:0]{index=0} -->

    <!-- Script do Bootstrap para JavaScript funcional (componentes dinâmicos, dropdowns, modais etc) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
</body>
</html>
